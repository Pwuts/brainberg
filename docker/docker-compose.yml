services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        DATABASE_URL: postgresql://brainberg:${DB_PASSWORD}@db:5432/brainberg
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://brainberg.eu}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Brainberg}
    container_name: brainberg-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - DATABASE_URL=postgresql://brainberg:${DB_PASSWORD}@db:5432/brainberg
      - AUTH_URL=${AUTH_URL:-http://localhost:3000}
      - AUTH_SECRET
      - ADMIN_SECRET
      - CRON_SECRET
      - NODE_ENV=production
      - VIRTUAL_HOST
      - LETSENCRYPT_HOST
      - LETSENCRYPT_EMAIL
      - EVENTBRITE_API_TOKEN
    depends_on:
      db:
        condition: service_healthy
    networks:
      - brainberg-net
      - web

  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: brainberg-db
    restart: always
    environment:
      POSTGRES_DB: brainberg
      POSTGRES_USER: brainberg
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brainberg -d brainberg"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - brainberg-net

volumes:
  pgdata:
    driver: local

networks:
  brainberg-net:
    driver: bridge
  web:
    external: true
