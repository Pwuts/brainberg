services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: techpulse-db
    restart: always
    environment:
      POSTGRES_DB: techpulse_dev
      POSTGRES_USER: techpulse
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techpulse -d techpulse_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
